version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: proc-viz-sqlserver
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: 'YourStrongPassword123!'
      MSSQL_PID: 'Express'
      MSSQL_AUTHENTICATION: 'sql'
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - proc-viz-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrongPassword123!' -Q 'SELECT 1' || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sqlserver_data:

networks:
  proc-viz-network:
    driver: bridge
